<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Revenue Doctor Stretch</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #12122b; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .container { 
            max-width: 1100px; 
            margin: auto; 
            background: #1c1c3a; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.5); 
            flex: 1;
            width: 100%;
            box-sizing: border-box;
        }
        .header { 
            text-align: center; 
            margin-bottom: 30px; 
            border-bottom: 2px solid #4e4eff; 
            padding-bottom: 20px; 
        }
        .brand-logo {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin: 0;
        }
        .brand-logo .doctor { color: #ffffff; }
        .brand-logo .stretch { color: #ff4757; } 
        .brand-sub {
            font-size: 12px;
            color: #a5a5d4;
            letter-spacing: 3px;
            margin-top: 2px;
            text-transform: uppercase;
        }
        h1 { 
            color: #00f2fe; 
            font-size: 22px; 
            margin-top: 15px; 
        }

        /* Area Drop Zone Baru yang Bisa Di-drag */
        .upload-section { 
            margin-bottom: 30px; 
            text-align: center; 
            background: #25254d; 
            padding: 40px 20px; 
            border-radius: 12px; 
            border: 2px dashed #4e4eff;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        /* Efek visual saat file diseret di atas kotak */
        .upload-section.dragover {
            background: #313166;
            border-color: #00f2fe;
            transform: scale(1.01);
        }
        .upload-section label {
            display: block;
            margin-bottom: 15px;
            color: #a5a5d4;
            font-weight: bold;
            font-size: 16px;
            pointer-events: none; /* Agar tidak mengganggu drop area */
        }
        .upload-hint {
            font-size: 13px;
            color: #8a8aa9;
            margin-top: 8px;
            pointer-events: none;
        }
        input[type=file] { 
            display: none; /* Sembunyikan tombol bawaan agar rapi */
        }

        #results {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card { 
            background: #25254d; 
            padding: 20px; 
            border-radius: 12px; 
            text-align: center; 
            border-left: 5px solid #4e4eff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .card.insentif {
            border-left: 5px solid #ff9f43;
        }
        .card h3 { 
            margin: 0 0 10px 0; 
            font-size: 14px; 
            color: #a5a5d4; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .amount { 
            font-size: 26px; 
            font-weight: bold; 
        }
        #totalRevenue { color: #00f2fe; }
        #totalIncentive { color: #ff9f43; }
        .chart-container {
            background: #25254d; 
            padding: 20px; 
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid #25254d;
            font-size: 14px;
            color: #8a8aa9;
        }
        .footer a {
            color: #00f2fe;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="brand-logo">
                <span class="doctor">Doctor</span><span class="stretch">stretch</span>
            </div>
            <div class="brand-sub">From Japan</div>
            <h1>Dashboard Revenue & Insentif</h1>
        </div>
        
        <div class="upload-section" id="dropZone">
            <label id="uploadLabel">Seret & Jatuhkan (Drag & Drop) File CSV di Sini</label>
            <div class="upload-hint">Atau klik area ini untuk memilih file</div>
            <input type="file" id="csvFile" accept=".csv">
        </div>

        <div id="results">
            <div class="card">
                <h3>Total Revenue</h3>
                <span id="totalRevenue" class="amount">Rp 0</span>
            </div>
            <div class="card insentif">
                <h3>Total Insentif Bersih</h3>
                <span id="totalIncentive" class="amount">Rp 0</span>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="historyChart"></canvas>
        </div>
    </div>

    <div class="footer">
        Dibuat oleh <a href="https://instagram.com/hermawan_sw" target="_blank">@hermawan_sw</a>
    </div>
    
    <script>
        let myChart = null;
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('csvFile');
        const uploadLabel = document.getElementById('uploadLabel');

        // Klik area dropzone untuk buka explorer file konvensional
        dropZone.addEventListener('click', () => fileInput.click());

        // Efek visual saat file diseret masuk/keluar area kotak
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
            }, false);
        });

        // Menangkap file yang dijatuhkan (Dropped)
        dropZone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length > 0 && files[0].name.endsWith('.csv')) {
                fileInput.files = files;
                handleFile(files[0]);
            } else {
                alert('Mohon jatuhkan file dengan format .CSV ya!');
            }
        });

        // Menangkap file lewat jalur klik biasa
        fileInput.addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            uploadLabel.innerText = "File Terbaca: " + file.name;
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                processData(text);
            };
            reader.readAsText(file);
        }

        function processData(text) {
            const rows = text.split('\n');
            let totalRev = 0;
            for(let i=0; i<rows.length; i++) {
                if(rows[i].trim() !== '') {
                    const value = parseFloat(rows[i].split(',')[0]);
                    if(!isNaN(value)) totalRev += value;
                }
            }
            
            let step1 = totalRev - 18000000;
            let step2 = step1 > 0 ? step1 * 1.1 : 0;
            let incentive = step2 * 0.30;
            
            document.getElementById('totalRevenue').innerText = 'Rp ' + totalRev.toLocaleString('id-ID');
            document.getElementById('totalIncentive').innerText = 'Rp ' + incentive.toLocaleString('id-ID');
            document.getElementById('results').style.display = 'grid';
            
            updateChart(incentive);
        }

        function updateChart(currentIncentive) {
            const ctx = document.getElementById('historyChart').getContext('2d');
            
            if(myChart) {
                myChart.destroy();
            }

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Bulan Lalu 1', 'Bulan Lalu 2', 'Bulan Ini (Hasil Upload)'],
                    datasets: [{
                        label: 'Insentif Anda (Rp)',
                        data: [4500000, 5200000, currentIncentive],
                        backgroundColor: ['#4e4eff', '#4e4eff', '#ff9f43'],
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: '#ffffff' } }
                    },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#a5a5d4' } },
                        y: { grid: { color: '#25254d' }, ticks: { color: '#a5a5d4' } }
                    }
                }
            });
        }
    </script>
</body>
</html>
