<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Revenue Doctor Stretch</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Mengubah total tema menjadi Dark Mode seperti gambar */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #12122b; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px; 
        }
        .container { 
            max-width: 1100px; 
            margin: auto; 
            background: #1c1c3a; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.5); 
        }
        
        /* Header & Pengganti Logo Otomatis */
        .header { 
            text-align: center; 
            margin-bottom: 30px; 
            border-bottom: 2px solid #4e4eff; 
            padding-bottom: 20px; 
        }
        .brand-logo {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin: 0;
        }
        .brand-logo .doctor { color: #ffffff; }
        .brand-logo .stretch { color: #ff4757; } /* Aksen merah khas Doctor Stretch */
        .brand-sub {
            font-size: 12px;
            color: #a5a5d4;
            letter-spacing: 3px;
            margin-top: 2px;
            text-transform: uppercase;
        }
        h1 { 
            color: #00f2fe; 
            font-size: 22px; 
            margin-top: 15px; 
        }

        /* Bagian Unggah File */
        .upload-section { 
            margin-bottom: 30px; 
            text-align: center; 
            background: #25254d; 
            padding: 25px; 
            border-radius: 12px; 
            border: 1px dashed #4e4eff;
        }
        .upload-section label {
            display: block;
            margin-bottom: 12px;
            color: #a5a5d4;
            font-weight: bold;
        }
        input[type=file] { 
            padding: 10px 20px; 
            background: #4e4eff; 
            border: none; 
            border-radius: 8px; 
            color: #fff; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }
        input[type=file]:hover {
            background: #3939d1;
        }

        /* Kartu Statistik (Grid seperti di gambar) */
        .grid-results {
            display: grid;
            grid-template-columns: 1px 1px;
            gap: 20px;
            margin-top: 20px;
        }
        /* Trik CSS Grid Dinamis */
        #results {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card { 
            background: #25254d; 
            padding: 20px; 
            border-radius: 12px; 
            text-align: center; 
            border-left: 5px solid #4e4eff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .card.insentif {
            border-left: 5px solid #ff9f43;
        }
        .card h3 { 
            margin: 0 0 10px 0; 
            font-size: 14px; 
            color: #a5a5d4; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .amount { 
            font-size: 26px; 
            font-weight: bold; 
        }
        #totalRevenue { color: #00f2fe; }
        #totalIncentive { color: #ff9f43; }

        /* Grafik */
        .chart-container {
            background: #25254d; 
            padding: 20px; 
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="brand-logo">
                <span class="doctor">Doctor</span><span class="stretch">stretch</span>
            </div>
            <div class="brand-sub">From Japan</div>
            <h1>Dashboard Revenue & Insentif</h1>
        </div>
        
        <div class="upload-section">
            <label for="csvFile">Silakan Unggah File Laporan (CSV) Anda</label>
            <input type="file" id="csvFile" accept=".csv">
        </div>

        <div id="results">
            <div class="card">
                <h3>Total Revenue</h3>
                <span id="totalRevenue" class="amount">Rp 0</span>
            </div>
            <div class="card insentif">
                <h3>Total Insentif Bersih</h3>
                <span id="totalIncentive" class="amount">Rp 0</span>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="historyChart"></canvas>
        </div>
    </div>
    
    <script>
        let myChart = null;

        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                processData(text);
            };
            reader.readAsText(file);
        });

        function processData(text) {
            const rows = text.split('\n');
            let totalRev = 0;
            for(let i=1; i<rows.length; i++) {
                if(rows[i].trim() !== '') {
                    const value = parseFloat(rows[i].split(',')[0]);
                    if(!isNaN(value)) totalRev += value;
                }
            }
            
            // Rumus Insentif Kamu
            let step1 = totalRev - 18000000;
            let step2 = step1 > 0 ? step1 * 1.1 : 0;
            let incentive = step2 * 0.30;
            
            document.getElementById('totalRevenue').innerText = 'Rp ' + totalRev.toLocaleString('id-ID');
            document.getElementById('totalIncentive').innerText = 'Rp ' + incentive.toLocaleString('id-ID');
            
            // Tampilkan kartu hasil dengan gaya Grid
            document.getElementById('results').style.display = 'grid';
            
            updateChart(incentive);
        }

        function updateChart(currentIncentive) {
            const ctx = document.getElementById('historyChart').getContext('2d');
            
            // Hancurkan grafik lama jika ada agar tidak tumpang tindih saat upload ulang
            if(myChart) {
                myChart.destroy();
            }

            // Atur warna grafik agar serasi dengan tema dark mode gambar
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Bulan Lalu 1', 'Bulan Lalu 2', 'Bulan Ini (Hasil Upload)'],
                    datasets: [{
                        label: 'Insentif Anda (Rp)',
                        data: [4500000, 5200000, currentIncentive],
                        backgroundColor: ['#4e4eff', '#4e4eff', '#ff9f43'],
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: '#ffffff' } }
                    },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#a5a5d4' } },
                        y: { grid: { color: '#25254d' }, ticks: { color: '#a5a5d4' } }
                    }
                }
            });
        }
    </script>
</body>
</html>
